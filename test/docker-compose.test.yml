# test/docker-compose.test.yml
#
# Self-contained E2E infrastructure. Builds the product image from source
# (so the test always matches the current code), uses an EPHEMERAL tmpfs DB
# (fresh every run, so the suite is idempotent and never touches production
# data), gates the Playwright runner on the app's /api/health healthcheck, and
# exits with the test result code.
#
# Run from the repo root:
#   docker compose -f test/docker-compose.test.yml up --abort-on-container-exit --exit-code-from playwright

services:
  app:
    # Build the product image from the repo root so E2E always exercises the
    # current code. NOT a :latest tag - the compose owns the build context.
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - LLM_MOCK=true
      - DB_PATH=/app/db/finally.db
    tmpfs:
      # EPHEMERAL DB: a tmpfs gives every `up` a clean, empty /app/db, so the
      # app re-seeds a fresh $10,000 portfolio on each run. This makes the suite
      # IDEMPOTENT — 01-fresh-start asserts $10k cash, which a persisted volume
      # would break once 02-buy/03-sell record trades. tmpfs lives in RAM and is
      # gone when the container stops, so production finally-data is never touched
      # and no manual `down -v` is needed between runs.
      - /app/db
    healthcheck:
      # stdlib urllib because python:3.12-slim has no curl.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 2s
      timeout: 3s
      retries: 30

  playwright:
    # Matches the @playwright/test 1.61.1 pin in package.json. If this tag
    # is unavailable, fall back to whatever tag matches `npm view @playwright/test version`.
    image: mcr.microsoft.com/playwright:v1.61.0-noble
    depends_on:
      app:
        condition: service_healthy
    # Share the app container's network namespace so the app is reachable on
    # loopback (127.0.0.1:8000). Chrome force-upgrades non-loopback origins to
    # https; the app serves plain HTTP only. depends_on still gates startup on
    # the app healthcheck; npm install still has internet via the app's egress.
    network_mode: "service:app"
    working_dir: /home/pwuser/test
    # ipc: host avoids Chromium shared-memory issues on Linux hosts (RESEARCH).
    ipc: host
    volumes:
      # Bind-mount the test dir so the runner sees the pinned package.json
      # and the e2e specs. The container runs `npm install` then `npx playwright test`.
      - ./:/home/pwuser/test
    # Install the pinned Playwright, run the specs with the line reporter,
    # exit with the test result code (so --exit-code-from playwright surfaces it).
    command: ["sh", "-c", "npm install && npx playwright test --reporter=line"]